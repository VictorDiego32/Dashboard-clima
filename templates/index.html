<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clima em Tempo Real</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            /* Fundo da página */
            background-color: #2c3e50; 
            color: #ecf0f1; 
        }
        .container {
            margin-top: 50px;
        }
        h1 {
            color: #f1c40f; /* Título em amarelo */
            font-weight: bold;
        }
        /* Personalizando a tabela */
        .table {
            background-color: white;
            border-radius: 10px;
            overflow: hidden; /* Mantém os cantos arredondados */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🌍  painel clima capitais </h1>
        
        <div class="shadow">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Cidade</th>
                        <th>Temperatura</th>
                        <th>Sensação Térmica</th>
                        <th>Condição</th>
                        <th>Umidade</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr><td colspan="5" class="text-center">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
        <p class="text-end mt-2" style="color: #bdc3c7; font-size: 0.9em;" id="hora-atualizacao"></p>
    </div>

    <script>
        async function carregarDados() {
            try {
                const resposta = await fetch('/api/clima');
                const dados = await resposta.json();

                const tabela = document.getElementById('tabela-corpo');
                tabela.innerHTML = ''; // Limpa a mensagem de carregando

                dados.forEach(item => {
                    tabela.innerHTML += `
                        <tr>
                            <td><strong>${item.cidade}</strong></td>
                            <td>${item.temperatura.toFixed(1)}°C</td>
                            <td>${item.sensacao.toFixed(1)}°C</td>
                            <td>${item.condicao}</td>
                            <td>${item.umidade}%</td>
                        </tr>`;
                });

                // Atualiza a hora na tela
                const agora = new Date().toLocaleTimeString();
                document.getElementById('hora-atualizacao').innerText = 'Última atualização: ' + agora;

            } catch (e) {
                console.error("Aguardando dados...", e);
            }
        }

        // Carrega imediatamente ao abrir e atualiza a cada 3 segundos
        carregarDados();
        setInterval(carregarDados, 3000);
    </script>
</body>
</html>
